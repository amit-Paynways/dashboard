<div class="shell">
  <aside class="sidebar" aria-label="Primary navigation">
    <div class="brand">
      <div class="brand__sub">PAYGLOBAL360</div>
      <div class="brand__mark">PAY<span class="brand__x">X</span></div>
    </div>

    <div class="nav">
      <div class="nav__group">Main</div>
      <a class="nav__item" routerLink="/dashboard">Dashboard</a>
      <a class="nav__item nav__item--active" routerLink="/payments">Payments</a>
      <a class="nav__item" [routerLink]="['/payments']" [queryParams]="{ flow: 'outward' }">New Outward</a>
      <a class="nav__item" [routerLink]="['/payments']" [queryParams]="{ flow: 'inward' }">New Inward</a>

      <div class="nav__group">Bank Portal</div>
      <a class="nav__item" routerLink="/bank-dashboard">Bank Dashboard</a>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar__title">
        <h1>Payments</h1>
        <span class="topbar__org">Exportadora Global SA de CV</span>
      </div>

      <div class="topbar__tools">
        <button class="btn btn--ghost" type="button">Export Data</button>
      </div>
    </header>

    <app-payments-table [flow]="flow()"></app-payments-table>
  </main>
</div>
